replicaCount: 1

image:
  repository: 316336724953.dkr.ecr.eu-north-1.amazonaws.com/log-writer
  tag: latest
  pullPolicy: Always

nameOverride: "log-writer-app"
fullnameOverride: "log-writer-app"

app:
  logDir: /data
  intervalSeconds: 300        # 5 minutes
  maxFileSizeMB: 5

# 💾 Persistent storage (EFS)
persistence:
  enabled: true
  existingClaim: shared-efs-pvc
  mountPath: /data

# 🧠 Resources (important for autoscaler decisions)
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

# ⚙️ Node scheduling (works with Karpenter)
nodeSelector: {}

tolerations: []

affinity: {}

# 🔐 Security context (optional but good practice)
securityContext:
  runAsUser: 1000
  runAsNonRoot: true
  fsGroup: 1000

# 🌐 Service (not strictly needed for logger, but harmless)
service:
  type: ClusterIP
  port: 80

# 🚀 Autoscaling compatibility (optional toggle)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80

# 🔄 Pod annotations (useful for ArgoCD sync waves if needed)
podAnnotations: {}

# 🧾 Extra env vars (wired into deployment template)
env:
  - name: LOG_DIR
    value: "/data"
  - name: INTERVAL_SECONDS
    value: "300"
  - name: MAX_FILE_SIZE_MB
    value: "5"